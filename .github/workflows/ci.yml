name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dssp

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Lint with ruff
        run: ruff check varis/ tests/

      - name: Type check with mypy
        run: mypy varis/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --timeout=120 --tb=short
        env:
          NCBI_API_KEY: ""
          CLINVAR_API_KEY: ""
